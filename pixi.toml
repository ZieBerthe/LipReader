[workspace]
channels = ["conda-forge"]
name = "LipReader"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "==3.10"
pip = "*"
gdown = ">=5.2.1,<6"
tqdm = ">=4.67.3,<5"
setuptools = ">=82.0.1,<83"

[pypi-dependencies]
torch = ">=2.5.0"
torchvision = "*"
opencv-python = ">=4.10.0"
mediapipe = ">=0.10.32, <0.11"
soundfile = "*"
numpy = "*"
matplotlib = "*"
librosa = "*"
imageio = "*"
tqdm = "*"

[pypi-options]
index-url = "https://download.pytorch.org/whl/cu121"
extra-index-urls = ["https://pypi.org/simple"]

[tool.pixi.environments]
dev = ["dev"]
cuda = ["cuda"]
